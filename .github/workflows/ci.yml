name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build & Validate Boilerplate V4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.11.0

      - name: Get pnpm cache directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Formatting
        run: |
          pnpm run lint
          npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,json}" "framework-engine/src/**/*.{js,jsx,ts,tsx}"

      - name: TypeScript Typecheck
        run: pnpm run typecheck

      - name: Run Engine Test Suite
        run: node --experimental-strip-types --test "framework-engine/src/**/*.test.ts"

      - name: Next.js Production Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: 'https://mock-url.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'mock-anon-key'
